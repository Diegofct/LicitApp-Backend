spring.application.name=licitapp

# Configuracion de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/licitapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway settings
# baseline-on-migrate=true: la primera vez marca el schema actual como V1 sin re-ejecutar DDL
# baseline-version=1: el baseline corresponde a V1__baseline.sql
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# Configuracion del path base para los endpoints
server.servlet.context-path=/api/v1

# Analisis de cumplimiento
# Numero maximo de propuestas de consorcio alternativas devueltas por POST /analisis/evaluar.
analisis.sugerencia.max-propuestas=3

#SECOP
secop.base-url=https://www.datos.gov.co/resource/p6dx-8zbt.json
secop.app-token=${SECOP_APP_TOKEN}
secop.page-size-default=10

# Configuracion de subida de archivos (Multipart)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Timeouts para procesamiento largo de documentos
server.tomcat.connection-timeout=120000
spring.mvc.async.request-timeout=120000

# Seguridad / JWT
# JWT_SECRET debe tener al menos 32 caracteres (firma HMAC-SHA256).
jwt.secret=${JWT_SECRET}
# Expiracion del token de acceso en milisegundos (por defecto 24h).
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Bootstrap del primer ADMIN (solo si no existe ningun ADMIN).
# Habilitar la primera vez, crear el admin y luego volver a deshabilitar.
app.admin.bootstrap-enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
app.admin.correo=${ADMIN_CORREO:}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.nombre=${ADMIN_NOMBRE:Administrador}